<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Dermoscopy lens vignette -->
    <radialGradient id="lens" cx="52%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7a4018" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#5c2e0e" stop-opacity="0.85"/>
      <stop offset="65%"  stop-color="#2a1005" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0402" stop-opacity="1"/>
    </radialGradient>

    <!-- Pigment network pattern — fine diamond mesh -->
    <pattern id="pignet" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M9 0 L18 9 L9 18 L0 9 Z" fill="none" stroke="#3d1a06" stroke-width="0.8" opacity="0.7"/>
    </pattern>

    <!-- Fine dot globules pattern -->
    <pattern id="globules" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="2.2" fill="#2e1208" opacity="0.55"/>
    </pattern>

    <!-- Clip to dermoscopy circle -->
    <clipPath id="dermclip">
      <ellipse cx="600" cy="200" rx="310" ry="195"/>
    </clipPath>

    <!-- Outer vignette -->
    <radialGradient id="outerVig" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#050201" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="400" fill="#080402"/>

  <!-- Dermoscopy field — clipped to circle -->
  <g clip-path="url(#dermclip)">
    <!-- Base skin tone fill -->
    <ellipse cx="600" cy="200" rx="310" ry="195" fill="url(#lens)"/>

    <!-- Perilesional skin texture — warm tan patches -->
    <ellipse cx="540" cy="175" rx="180" ry="120" fill="#9b5520" opacity="0.18"/>
    <ellipse cx="650" cy="230" rx="140" ry="90"  fill="#b06228" opacity="0.14"/>
    <ellipse cx="580" cy="210" rx="100" ry="70"  fill="#c07030" opacity="0.1"/>

    <!-- Main lesion body — irregular dark blob -->
    <path d="M570,145 C610,128 665,132 695,158 C728,186 738,218 725,248
             C710,280 680,298 645,302 C608,306 572,294 548,268
             C522,240 514,205 522,178 C530,155 548,160 570,145 Z"
          fill="#2c1208" opacity="0.88"/>

    <!-- Lesion inner variation — darker center -->
    <path d="M595,165 C622,155 652,160 670,180 C690,202 692,228 678,248
             C662,268 638,276 615,272 C590,268 572,252 565,230
             C558,208 562,185 580,172 C587,166 595,165 595,165 Z"
          fill="#1a0905" opacity="0.9"/>

    <!-- Pigment network over lesion area -->
    <path d="M570,145 C610,128 665,132 695,158 C728,186 738,218 725,248
             C710,280 680,298 645,302 C608,306 572,294 548,268
             C522,240 514,205 522,178 C530,155 548,160 570,145 Z"
          fill="url(#pignet)" opacity="0.6"/>

    <!-- Globules at lesion border -->
    <path d="M570,145 C610,128 665,132 695,158 C728,186 738,218 725,248
             C710,280 680,298 645,302 C608,306 572,294 548,268
             C522,240 514,205 522,178 C530,155 548,160 570,145 Z"
          fill="url(#globules)" opacity="0.5"/>

    <!-- Blue-white veil — regression zone -->
    <ellipse cx="618" cy="192" rx="42" ry="30" fill="#c8d8e8" opacity="0.12"/>
    <ellipse cx="618" cy="192" rx="28" ry="20" fill="#dce8f0" opacity="0.09"/>

    <!-- Scattered peripheral globules (hand-placed) -->
    <circle cx="548" cy="168" r="4.5" fill="#1e0c05" opacity="0.75"/>
    <circle cx="534" cy="196" r="3.8" fill="#1e0c05" opacity="0.7"/>
    <circle cx="540" cy="224" r="5"   fill="#1e0c05" opacity="0.72"/>
    <circle cx="562" cy="272" r="4"   fill="#1e0c05" opacity="0.68"/>
    <circle cx="598" cy="298" r="5.5" fill="#1e0c05" opacity="0.74"/>
    <circle cx="638" cy="302" r="4.2" fill="#1e0c05" opacity="0.7"/>
    <circle cx="678" cy="288" r="4.8" fill="#1e0c05" opacity="0.72"/>
    <circle cx="706" cy="260" r="4"   fill="#1e0c05" opacity="0.68"/>
    <circle cx="718" cy="228" r="3.5" fill="#1e0c05" opacity="0.65"/>
    <circle cx="712" cy="188" r="4.5" fill="#1e0c05" opacity="0.7"/>
    <circle cx="690" cy="152" r="4"   fill="#1e0c05" opacity="0.68"/>
    <circle cx="658" cy="132" r="3.8" fill="#1e0c05" opacity="0.65"/>
    <circle cx="618" cy="128" r="4.5" fill="#1e0c05" opacity="0.7"/>
    <circle cx="586" cy="134" r="4"   fill="#1e0c05" opacity="0.67"/>

    <!-- Fine streaks radiating from lesion border -->
    <line x1="538" y1="176" x2="522" y2="162" stroke="#2a1007" stroke-width="1.2" opacity="0.5"/>
    <line x1="524" y1="210" x2="506" y2="208" stroke="#2a1007" stroke-width="1.2" opacity="0.5"/>
    <line x1="542" y1="258" x2="528" y2="272" stroke="#2a1007" stroke-width="1.2" opacity="0.5"/>
    <line x1="720" y1="200" x2="738" y2="196" stroke="#2a1007" stroke-width="1.2" opacity="0.5"/>
    <line x1="706" y1="162" x2="720" y2="150" stroke="#2a1007" stroke-width="1.2" opacity="0.5"/>

    <!-- Outer lens vignette (dark ring) -->
    <ellipse cx="600" cy="200" rx="310" ry="195" fill="url(#outerVig)"/>
  </g>

  <!-- Hard lens border -->
  <ellipse cx="600" cy="200" rx="310" ry="195"
           fill="none" stroke="#0a0402" stroke-width="24"/>
</svg>
